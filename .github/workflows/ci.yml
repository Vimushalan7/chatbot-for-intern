name: CI/CD — Research Paper AI Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Copy environment file
        working-directory: backend
        run: cp .env.example .env

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100 --ignore=E501,W503

  # ── Frontend Lint ────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Frontend files present:"
          ls frontend/

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t papermind-backend ./backend

      - name: Verify image
        run: docker images | grep papermind-backend
